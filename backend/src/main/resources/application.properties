# ============================================
# TaskFlow API - Application Configuration
# ============================================

spring.application.name=taskflow-api

# ---- Active Profile ----
spring.profiles.active=dev

# ---- MySQL (production) ----
spring.datasource.url=jdbc:mysql://localhost:3306/taskflow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:myUltraSecretKeyForTaskFlowAppThatIsLongEnoughForHS512}
app.jwt.expiration-ms=86400000

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Server ----
server.port=8080
